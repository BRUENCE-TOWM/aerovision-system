<nav class="navbar navbar-expand-lg navbar-light soft-navbar sticky-top">
    <div class="container">
        <a class="navbar-brand fw-semibold" href="{% url 'core:home' %}">交通场景识别平台</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0 align-items-lg-center nav-squares">
                <li class="nav-item">
                    <a class="nav-link nav-square {% if request.path == '/' %}active nav-square-active{% endif %}" href="{% url 'core:home' %}">首页</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link nav-square {% if request.path == '/about/' %}active nav-square-active{% endif %}" href="{% url 'core:about' %}">平台介绍</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link nav-square {% if request.path == '/contact/' %}active nav-square-active{% endif %}" href="{% url 'core:contact' %}">联系支持</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link nav-square {% if request.path|slice:':15' == '/announcements/' %}active nav-square-active{% endif %}" href="{% url 'announcement:index' %}">公告中心</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link nav-square {% if request.path|slice:':11' == '/dashboard/' %}active nav-square-active{% endif %}" href="{% url 'dashboard:index' %}">工作台</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link nav-square {% if request.path|slice:':9' == '/uploads/' %}active nav-square-active{% endif %}" href="{% url 'uploads:index' %}">识别任务</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link nav-square {% if request.path|slice:':10' == '/feedback/' %}active nav-square-active{% endif %}" href="{% url 'feedback:index' %}">反馈中心</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link nav-square {% if request.path|slice:':7' == '/admin/' %}active nav-square-active{% endif %}" href="/admin/">管理后台</a>
                </li>
            </ul>

                {% if request.user.is_authenticated %}
                    <a class="btn btn-outline-secondary btn-sm" href="{% url 'accounts:profile' %}">个人中心</a>
                    <form method="post" action="{% url 'accounts:logout' %}">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-dark btn-sm">退出登录</button>
                    </form>
                {% else %}
                    <a class="btn btn-dark btn-sm" href="{% url 'accounts:login' %}">登录</a>
                    <a class="btn btn-outline-dark btn-sm" href="{% url 'accounts:signup' %}">注册</a>
                {% endif %}
            </div>
        </div>
    </div>
