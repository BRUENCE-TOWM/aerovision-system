{% extends "base.html" %}

{% block title %}更新反馈状态 | 交通场景识别平台{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="section-shell">
            <h1 class="h3 mb-2">更新反馈状态</h1>
            <p class="text-secondary mb-4">这里用于管理员维护反馈处理进度。</p>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-dark">保存状态</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
