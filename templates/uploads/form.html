{% extends "base.html" %}

{% block title %}新建识别任务 | 交通场景识别平台{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="section-shell">
            <div class="card-body p-4">
                <h1 class="h3 mb-2">新建识别任务</h1>
                <p class="text-secondary mb-4">上传交通场景图像并填写任务说明，后续可在详情页查看模型识别结果。</p>
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-dark">提交任务</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
