{% extends "base.html" %}

{% block title %}Security | AeroVision{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="section-shell">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h1 class="h3 mb-1">安全设置</h1>
                    <p class="text-secondary mb-0">这里先提供密码修改入口，后续可以继续扩展二次验证和登录记录。</p>
                </div>
                <a class="btn btn-outline-dark" href="{% url 'accounts:profile' %}">返回个人中心</a>
            </div>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-dark">更新密码</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
