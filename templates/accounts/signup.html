{% extends "base.html" %}

{% block title %}Sign Up | AeroVision{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5">
        <div class="card shadow-sm border-0 soft-panel">
            <div class="card-body p-4 p-lg-5">
                <h1 class="h3 mb-2">创建账户</h1>
                <p class="text-secondary mb-4">注册后即可访问工作台、文件管理和个人中心。</p>
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-dark w-100">注册并进入系统</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
