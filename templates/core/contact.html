{% extends "base.html" %}

{% block title %}Contact | AeroVision{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="section-shell">
            <span class="badge soft-badge mb-2">Contact</span>
            <h1 class="h2 mb-3">联系信息</h1>
            <div class="row g-3">
                <div class="col-md-4">
                    <div class="metric-card">
                        <span class="metric-label">邮箱</span>
                        <strong>support@example.com</strong>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="metric-card">
                        <span class="metric-label">工作时间</span>
                        <strong>09:00-18:00</strong>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="metric-card">
                        <span class="metric-label">反馈入口</span>
                        <strong><a href="{% url 'feedback:create' %}">提交反馈</a></strong>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
