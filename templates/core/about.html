{% extends "base.html" %}

{% block title %}平台介绍 | 交通场景识别平台{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="section-shell">
            <span class="badge soft-badge mb-2">平台介绍</span>
            <h1 class="h2 mb-3">关于平台</h1>
            <p class="text-secondary">
                本平台围绕交通场景图像识别展开建设，重点服务于道路环境分析、交通目标检测、识别结果展示和任务管理。
            </p>
            <ul class="soft-list">
                <li>以图像识别模型为核心能力，支持交通场景任务上传与处理。</li>
                <li>以服务端页面渲染为主，确保页面稳定、清晰、易维护。</li>
                <li>为后续接入更复杂的识别模型、结果分析与权限管理预留扩展能力。</li>
            </ul>
        </div>
    </div>
</div>
{% endblock %}
